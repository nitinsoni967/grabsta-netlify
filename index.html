<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grabsta — Instagram Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --accent: #E8FF47;
      --accent-dark: #c8df1f;
      --text: #f0f0f0;
      --muted: #888;
      --muted2: #555;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container { max-width: 760px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

    /* Header */
    header {
      padding: 40px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border: 1px solid var(--border-hover);
      border-radius: 100px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* Hero */
    .hero {
      padding: 64px 0 40px;
      text-align: center;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 16px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--accent);
      position: relative;
    }
    .hero p {
      font-size: 16px;
      color: var(--muted);
      font-weight: 300;
      max-width: 400px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    /* Input area */
    .input-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 6px 6px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.08);
    }
    .input-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      min-width: 0;
    }
    .input-wrap input::placeholder { color: var(--muted2); }

    .btn-fetch {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-fetch:hover { background: var(--accent-dark); }
    .btn-fetch:active { transform: scale(0.97); }
    .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Supported types */
    .supported {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted2);
    }
    .supported span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted2);
    }

    /* Status */
    #status {
      margin-top: 24px;
      display: none;
    }
    .status-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--muted);
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border-hover);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-error .status-inner {
      border-color: rgba(255,80,80,0.3);
      color: #ff6b6b;
    }
    .status-error .status-inner svg { color: #ff6b6b; }

    /* Results */
    #results { margin-top: 32px; display: none; }

    /* Post header */
    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .post-meta { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }
    .post-username {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 15px;
    }
    .post-type {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 100px;
    }

    /* Caption */
    .caption-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      position: relative;
    }
    .caption-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted2);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .caption-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      max-height: 80px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .caption-text.expanded { max-height: 500px; }

    .caption-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .btn-expand {
      font-size: 12px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      padding: 0;
    }
    .btn-copy-caption {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-copy-caption:hover { border-color: var(--border-hover); color: var(--text); }
    .btn-copy-caption.copied { color: var(--accent); border-color: rgba(232,255,71,0.3); }

    /* Download all bar */
    .dl-all-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .dl-all-info { font-size: 14px; color: var(--muted); }
    .dl-all-info strong { color: var(--text); font-weight: 500; }

    .btn-dl-all {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-dl-all:hover { background: var(--accent-dark); }
    .btn-dl-all:active { transform: scale(0.97); }
    .btn-dl-all:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Media grid */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .media-grid.single { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; }

    .media-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .media-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }

    .thumb-wrap {
      aspect-ratio: 1;
      background: var(--surface2);
      position: relative;
      overflow: hidden;
    }
    .media-grid.single .thumb-wrap { aspect-ratio: 4/3; }

    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .thumb-wrap img.loaded { opacity: 1; }

    .thumb-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-placeholder svg { width: 32px; height: 32px; color: var(--muted2); }

    .slide-num {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
    }
    .video-badge {
      position: absolute;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 6px;
    }

    .card-footer {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-type { font-size: 12px; color: var(--muted); }

    .btn-dl-single {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-dl-single:hover { border-color: var(--accent); color: var(--accent); }
    .btn-dl-single.done { color: var(--accent); border-color: rgba(232,255,71,0.3); }

    /* Progress overlay for download all */
    .progress-wrap {
      margin-top: 12px;
      display: none;
    }
    .progress-bar-bg {
      height: 3px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 100px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 60px 0 40px;
      font-size: 12px;
      color: var(--muted2);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease forwards; }

    @media (max-width: 480px) {
      .hero h1 { letter-spacing: -1px; }
      .media-grid { grid-template-columns: repeat(2, 1fr); }
      .dl-all-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
      .btn-dl-all { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Grab<span>sta</span></div>
      <div class="badge">Free · No login</div>
    </header>

    <section class="hero">
      <h1>Download any<br><em>Instagram</em> media</h1>
      <p>Reels, carousels, photos — paste the link and grab everything in seconds.</p>

      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted2);flex-shrink:0">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
        <input type="text" id="urlInput" placeholder="https://www.instagram.com/p/..." autocomplete="off" spellcheck="false" />
        <button class="btn-fetch" id="fetchBtn" onclick="handleFetch()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>

      <div class="supported">
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Reels
        </span>
        <div class="dot"></div>
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Carousels
        </span>
        <div class="dot"></div>
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Photos
        </span>
      </div>
    </section>

    <div id="status"></div>
    <div id="results"></div>

    <footer>
      For personal use only. Respect content creators and Instagram's terms of service.
    </footer>
  </div>

  <script>
    let currentData = null;

    function showStatus(msg, type = 'loading') {
      const el = document.getElementById('status');
      el.style.display = 'block';
      el.className = type === 'error' ? 'status-error' : '';
      if (type === 'loading') {
        el.innerHTML = `<div class="status-inner"><div class="spinner"></div><span>${msg}</span></div>`;
      } else {
        el.innerHTML = `<div class="status-inner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>${msg}</span>
        </div>`;
      }
    }

    function hideStatus() {
      document.getElementById('status').style.display = 'none';
    }

    async function handleFetch() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) { document.getElementById('urlInput').focus(); return; }

      const btn = document.getElementById('fetchBtn');
      btn.disabled = true;
      document.getElementById('results').style.display = 'none';
      showStatus('Fetching post data…');

      try {
        const res = await fetch('/api/fetch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const json = await res.json();

        if (!res.ok || !json.success) {
          showStatus(json.error || 'Something went wrong. Make sure the post is public.', 'error');
          return;
        }

        currentData = json.data;
        hideStatus();
        renderResults(json.data);
      } catch (err) {
        showStatus('Network error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function renderResults(data) {
      const el = document.getElementById('results');
      el.style.display = 'block';
      el.className = 'fade-up';

      const isCarousel = data.type === 'carousel';
      const username = data.username || 'unknown';
      const caption = data.caption || '';
      const items = data.items || [];

      let html = `
        <div class="post-header">
          <div class="post-meta">
            <div class="avatar">${username.charAt(0).toUpperCase()}</div>
            <div>
              <div class="post-username">@${username}</div>
            </div>
          </div>
          <div class="post-type">${isCarousel ? `Carousel · ${items.length} items` : data.type === 'video' ? 'Reel / Video' : 'Photo'}</div>
        </div>
      `;

      // Caption
      if (caption) {
        html += `
          <div class="caption-box">
            <div class="caption-label">Caption</div>
            <div class="caption-text" id="captionText">${escapeHtml(caption)}</div>
            <div class="caption-actions">
              ${caption.length > 120 ? `<button class="btn-expand" onclick="toggleCaption()">Show more</button>` : '<span></span>'}
              <button class="btn-copy-caption" id="copyCapBtn" onclick="copyCaption()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy caption
              </button>
            </div>
          </div>
        `;
      }

      // Download all bar for carousels
      if (isCarousel && items.length > 1) {
        html += `
          <div class="dl-all-bar">
            <div class="dl-all-info"><strong>${items.length} files</strong> ready to download</div>
            <button class="btn-dl-all" id="dlAllBtn" onclick="downloadAll()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download all
            </button>
          </div>
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
            <div class="progress-label" id="progressLabel"></div>
          </div>
        `;
      }

      // Media grid
      const gridClass = items.length === 1 ? 'media-grid single' : 'media-grid';
      html += `<div class="${gridClass}">`;

      items.forEach((item, i) => {
        const ext = item.type === 'video' ? 'mp4' : 'jpg';
        const filename = `${username}_${i + 1}.${ext}`;
        const proxyUrl = `/api/proxy?url=${encodeURIComponent(item.url)}&filename=${encodeURIComponent(filename)}`;

        html += `
          <div class="media-card">
            <div class="thumb-wrap">
              <div class="thumb-placeholder">
                ${item.type === 'video'
                  ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>`
                  : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`
                }
              </div>
              ${item.thumbnail ? `<img src="${item.thumbnail}" alt="slide ${i+1}" onload="this.classList.add('loaded')" onerror="this.style.display='none'" />` : ''}
              ${items.length > 1 ? `<div class="slide-num">${i + 1}</div>` : ''}
              ${item.type === 'video' ? `<div class="video-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Video</div>` : ''}
            </div>
            <div class="card-footer">
              <div class="card-type">${item.type === 'video' ? 'MP4 video' : 'JPG image'}</div>
              <button class="btn-dl-single" id="dlBtn${i}" onclick="downloadSingle('${proxyUrl}', '${filename}', ${i})">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Save
              </button>
            </div>
          </div>
        `;
      });

      html += '</div>';
      el.innerHTML = html;
    }

    function downloadSingle(url, filename, idx) {
      const btn = document.getElementById(`dlBtn${idx}`);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      btn.classList.add('done');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Saved`;
      setTimeout(() => {
        btn.classList.remove('done');
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Save`;
      }, 2500);
    }

    async function downloadAll() {
      if (!currentData) return;
      const items = currentData.items;
      const username = currentData.username || 'media';
      const btn = document.getElementById('dlAllBtn');
      const progressWrap = document.getElementById('progressWrap');
      const progressFill = document.getElementById('progressFill');
      const progressLabel = document.getElementById('progressLabel');

      btn.disabled = true;
      progressWrap.style.display = 'block';

      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const ext = item.type === 'video' ? 'mp4' : 'jpg';
        const filename = `${username}_${i + 1}.${ext}`;
        const proxyUrl = `/api/proxy?url=${encodeURIComponent(item.url)}&filename=${encodeURIComponent(filename)}`;

        progressLabel.textContent = `Downloading ${i + 1} of ${items.length}…`;
        progressFill.style.width = `${((i) / items.length) * 100}%`;

        const a = document.createElement('a');
        a.href = proxyUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Small delay between downloads so browser doesn't block them
        await new Promise(r => setTimeout(r, 800));
      }

      progressFill.style.width = '100%';
      progressLabel.textContent = `All ${items.length} files downloaded!`;
      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Done!`;

      setTimeout(() => {
        progressWrap.style.display = 'none';
        progressFill.style.width = '0%';
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download all`;
      }, 3000);
    }

    function copyCaption() {
      const text = currentData?.caption || '';
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyCapBtn');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy caption`;
        }, 2000);
      });
    }

    function toggleCaption() {
      const el = document.getElementById('captionText');
      const btn = document.querySelector('.btn-expand');
      if (el.classList.contains('expanded')) {
        el.classList.remove('expanded');
        btn.textContent = 'Show more';
      } else {
        el.classList.add('expanded');
        btn.textContent = 'Show less';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Allow pressing Enter in input
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleFetch();
    });
  </script>
</body>
</html>
